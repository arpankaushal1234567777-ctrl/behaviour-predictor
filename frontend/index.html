<!DOCTYPE html>
<html>
<head>
    <title>AI Productivity Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI Productivity Predictor</h1>

    <form id="logForm">
        <input type="number" id="sleep" placeholder="Sleep Hours" required>
        <input type="number" id="study" placeholder="Study Hours" required>
        <input type="number" id="screen" placeholder="Screen Time (hrs)" required>
        <input type="number" id="exercise" placeholder="Exercise Minutes" required>
        <input type="number" id="mood" placeholder="Mood (1–10)" required>

        <button type="submit">Predict Productivity</button>
    </form>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
